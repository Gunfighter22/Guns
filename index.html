<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadhan App - Hover Effect</title>
    <style>
        /* 1. RESET & DASAR */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #eef9f3; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 2. FRAME PUTIH UTAMA */
        .main-frame {
            width: 100%;           
            max-width: 480px;      
            background-color: white;
            min-height: 100vh;
            border-radius: 45px 45px 0 0; 
            margin-top: 25px; 
            padding: 40px 25px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 3. BAGIAN ATAS (FOTO & TEKS) */
        .profile-photo {
            width: 100px; height: 100px;
            border-radius: 50%; background-color: #f0f0f0;
            margin-bottom: 20px; border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .text-header { text-align: center; margin-bottom: 50px; }
        .title { font-size: 22px; font-weight: bold; color: #333; }
        .subtitle { font-size: 14px; color: #777; margin-top: 5px; }

        /* 4. TOMBOL MENU HIJAU (SESUAI GAMBAR) */
        .menu-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .menu-item {
            width: 100%;
            padding: 22px;
            /* Menggunakan warna hijau sesuai gambar */
            background: linear-gradient(135deg, #008450 0%, #00a86b 100%);
            color: white;
            border-radius: 50px; /* Membuat lonjong sempurna */
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            
            /* Bayangan awal (halus sekali) */
            box-shadow: 0 4px 6px rgba(0, 132, 80, 0.1);
            
            /* Animasi transisi agar smooth */
            transition: all 0.3s ease;
        }

        /* EFEK HOVER (PAS KURSOR DI ATASNYA) */
        .menu-item:hover {
            /* Shadow jadi lebih tebal dan berwarna hijau */
            box-shadow: 0 8px 20px rgba(0, 132, 80, 0.3);
            /* Tombol sedikit naik ke atas (efek melayang) */
            transform: translateY(-3px);
            /* Warna sedikit lebih terang */
            filter: brightness(1.1);
        }

        /* EFEK CLICK (PAS DIPENCET) */
        .menu-item:active {
            transform: translateY(1px);
            box-shadow: 0 2px 5px rgba(0, 132, 80, 0.2);
        }

        @media (max-width: 480px) { .main-frame { margin-top: 0; border-radius: 0; } }
    </style>
</head>
<body>

    <div class="main-frame">
        
        <div id="slide-home" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div class="profile-photo"></div>

            <div class="text-header">
                <h1 class="title">Gunfighter</h1>
                <h2 class="title" style="font-weight: 800; margin-top: 5px;">Ramadhan Kareem</h2>
                <p class="subtitle">Mengisi Bulan Yang Penuh Berkah <br> dengan segala hal yang baik</p>
            </div>

            <div class="menu-container">
                <div class="menu-item">
                    1. Do'a Lailatul Qadar
                </div>
                <div class="menu-item">
                    2. 5 Sukses Ramadhan
                </div>
                <div class="menu-item">
                    3. Coming Soon
                </div>
            </div>
        </div>

    </div>

</body>
</html>
