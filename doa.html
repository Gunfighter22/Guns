<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doa Lailatul Qadar</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #eef9f3; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .main-frame {
            width: 100%;           
            max-width: 480px;      
            background-color: white;
            min-height: 100vh;
            border-radius: 45px 45px 0 0; 
            margin-top: 25px; 
            padding: 30px 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-link { align-self: flex-start; text-decoration: none; color: #008450; font-weight: bold; margin-bottom: 20px; }
        .header-title { color: #00a86b; font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .header-sub { color: #777; font-size: 13px; text-align: center; margin-bottom: 30px; }

        /* KOTAK DO'A */
        .card-arab {
            width: 100%;
            border: 1.5px solid #eef2f0;
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .arab-text { font-size: 28px; line-height: 2; color: #333; margin-bottom: 15px; }
        .latin-text { font-style: italic; color: #555; font-size: 13px; }

        /* PROGRESS SECTION */
        .progress-section { width: 100%; margin: 25px 0; }
        .progress-info { display: flex; justify-content: space-between; font-size: 13px; color: #444; font-weight: bold; margin-bottom: 8px; }
        .progress-bar-bg { width: 100%; height: 12px; background: #f0f0f0; border-radius: 10px; overflow: hidden; }
        
        .progress-fill { 
            width: 0%; 
            height: 100%; 
            background: linear-gradient(90deg, #10b981, #059669); 
            border-radius: 10px; 
            transition: width 0.3s ease; 
        }

        /* TOMBOL HITUNG */
        .btn-count {
            width: 100%;
            padding: 22px;
            background: #008450;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 132, 80, 0.25);
            transition: transform 0.1s;
        }
        .btn-count:active { transform: scale(0.95); }

        /* AKSI BAWAH */
        .bottom-actions { width: 100%; display: flex; gap: 12px; margin-top: 20px; }
        .btn-outline { flex: 3; padding: 12px; border: 1.5px solid #00a86b; background: white; color: #00a86b; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-reset { flex: 1; padding: 12px; border: 1.5px solid #ddd; background: white; color: #777; border-radius: 12px; cursor: pointer; }

        /* TULISAN GUNFIGHTER (PUDAR & KEREN) */
        .footer-brand {
            margin-top: 60px;       /* Jarak jauh dari tombol */
            color: #333;            
            opacity: 0.2;           /* Pudar banget biar estetik */
            font-size: 12px;        
            letter-spacing: 4px;    /* Jarak antar huruf biar keren */
            font-weight: 800;       
            text-align: center;
            text-transform: uppercase; 
        }

        @media (max-width: 480px) { .main-frame { margin-top: 0; border-radius: 0; } }
    </style>
</head>
<body>

    <div class="main-frame">
        <a href="index.html" class="back-link">← Kembali</a>

        <h1 class="header-title">Doa Lailatul Qadar</h1>
        <p class="header-sub">Yuk raih lailatul qodar dengan membaca doa berikut</p>

        <div class="card-arab">
            <div class="arab-text">اللَّهُمَّ إِنَّكَ عَفُوٌّ تُحِبُّ الْعَفْوَ فَاعْفُ عَنِّي</div>
            <div class="latin-text">"Allahumma innaka 'afuwwun tuhibbul 'afwa fa'fu 'anni"</div>
        </div>

        <div class="progress-section">
            <div class="progress-info">
                <span>Progress...</span>
                <span id="counter-text">0 / 1000</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <button class="btn-count" onclick="tambahHitungan()">Klik untuk Hitung</button>

       <div class="bottom-actions">
            <a href="bagikan.html" style="text-decoration: none; flex: 3;">
                <button class="btn-outline" style="width: 100%;">Bagikan Progress</button>
            </a>
            <button class="btn-reset" onclick="resetHitungan()">Reset</button>
        </div>

        <p class="footer-brand">GUNFIGHTER</p>
    </div>

    <script>
        // Ambil data dari penyimpanan browser (biar ga ilang pas refresh)
        let hitungan = localStorage.getItem('doaCounter') ? parseInt(localStorage.getItem('doaCounter')) : 0;
        const target = 1000;

        const teksCounter = document.getElementById('counter-text');
        const batangProgress = document.getElementById('progress-fill');

        // Update tampilan pertama kali saat load halaman
        updateTampilan();

        function tambahHitungan() {
            if (hitungan < target) {
                hitungan++; 
                saveToLocal();
                updateTampilan();
            }
        }

        function resetHitungan() {
            if (confirm("Apakah Anda yakin ingin mengulang dari 0?")) {
                hitungan = 0;
                saveToLocal();
                updateTampilan();
            }
        }

        function saveToLocal() {
            localStorage.setItem('doaCounter', hitungan);
        }

        function updateTampilan() {
            teksCounter.innerText = hitungan + " / " + target;
            let persen = (hitungan / target) * 100;
            batangProgress.style.width = persen + "%";
        }
    </script>

</body>
</html>
